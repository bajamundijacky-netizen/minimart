<!doctype html>
<html>
  <head>
    <title>Shop</title>
    <link rel="stylesheet" type="text/css" href="design.css" />
  </head>
  <body>
    
    <img src="./shop.png" alt="Shop Logo" class="shop-png">
    <p class="market-links">
      <a href="#About">About</a> |
      <a href="#details">Details</a> | 
      <a href="#faq&support">FAQ & Support</a> | 
    </p>
    <h1>Mini Mart Express</h1>
    
    <div class="info">
      <p>Welcome to my supermarket city! 
  Browse items and add them to your cart.</p>
    </div>
    <div class="products" id="productList"></div>
    <h2>🛒 Cart (<span id="cartCount">0</span>)</h2>
    <div class="cart">
    
      <div id="cartItems">Cart is empty</div>
      <h3>Total: ₱<span id="total">0</span></h3>
      <button onclick="clearCart()">Clear 🛒</button>
    </div>
    <footer>
      <p>© 2026 Mini Mart Express | All Rights Reserved</p>
    </footer>

    <script src="function.js"></script>
  </body>
</html>
